services:
  mysql:
    image: mysql:8
    container_name: housekeeping-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: housekeeping
    ports:
      - "${MYSQL_HOST_PORT:-4306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
